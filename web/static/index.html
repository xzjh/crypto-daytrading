<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Trading Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  :root[data-theme="dark"] {
    --bg: #0f1117; --card: #1a1d28; --card-inner: #12141c; --border: #2a2d3a;
    --text: #e0e0e0; --muted: #888; --green: #00c853; --red: #ff1744;
    --blue: #448aff; --orange: #ff9100; --purple: #b388ff; --cyan: #00e5ff;
    --btn-bg: #2a2d3a; --btn-active: #448aff; --btn-text: #ccc; --btn-active-text: #fff;
    --toggle-bg: #2a2d3a;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7; --card: #ffffff; --card-inner: #f0f1f3; --border: #dde0e6;
    --text: #1a1a2e; --muted: #777; --green: #00a844; --red: #d50000;
    --blue: #1565c0; --orange: #e65100; --purple: #7c4dff; --cyan: #0097a7;
    --btn-bg: #e8eaed; --btn-active: #1565c0; --btn-text: #555; --btn-active-text: #fff;
    --toggle-bg: #ccc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); transition:background .3s,color .3s; overflow-x:hidden; }
  .header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .header h1 { font-size:20px; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:14px; }
  .header .update { font-size:12px; color:var(--muted); }
  .theme-toggle { width:44px; height:24px; border-radius:12px; background:var(--toggle-bg); position:relative; cursor:pointer; border:none; transition:background .3s; }
  .theme-toggle::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--text); transition:transform .3s; }
  [data-theme="light"] .theme-toggle::after { transform:translateX(20px); }
  .theme-icon { font-size:14px; }
  .range-bar { display:flex; gap:4px; flex-wrap:wrap; }
  .range-btn { padding:4px 12px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; background:var(--btn-bg); color:var(--btn-text); transition:all .2s; }
  .range-btn.active { background:var(--btn-active); color:var(--btn-active-text); }
  .grid { display:grid; grid-template-columns:1fr; gap:16px; padding:16px 24px; }
  .card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:16px; transition:background .3s,border-color .3s; overflow:hidden; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
  .card-title { font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .stat { background:var(--card-inner); border-radius:8px; padding:12px; }
  .stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .stat-value { font-size:20px; font-weight:700; }
  .stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .positive { color:var(--green); }
  .negative { color:var(--red); }
  .signal { display:inline-block; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
  .signal-bull { background:rgba(0,200,83,.15); color:var(--green); }
  .signal-bear { background:rgba(255,23,68,.15); color:var(--red); }
  .trades-table { width:100%; border-collapse:collapse; font-size:13px; }
  .trades-table th,.trades-table td { padding:8px; border-bottom:1px solid var(--border); white-space:nowrap; vertical-align:middle; }
  .trades-table th { text-align:left; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; }
  .trades-table tbody tr { transition:background .15s; }
  .trades-table tbody tr:hover { background:var(--card-inner); }
  .trades-scroll { max-height:550px; overflow-y:auto; overflow-x:auto; }
  .trade-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; min-width:36px; text-align:center; }
  .trade-buy { background:rgba(0,200,83,.15); color:var(--green); }
  .trade-sell { background:rgba(255,23,68,.15); color:var(--red); }
  .trade-asset { font-weight:600; }
  .trade-asset-btc { color:var(--orange); }
  .trade-asset-eth { color:var(--purple); }
  .chart { width:100%; overflow:hidden; }
  .perf-scroll { overflow-x:auto; }

  /* Tabs */
  .tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; }
  .tab { padding:10px 24px; cursor:pointer; font-size:14px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
  .tab.active { color:var(--text); border-bottom-color:var(--btn-active); }
  .tab:hover { color:var(--text); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .tab-btc .tab.active { border-bottom-color:var(--orange); }
  .tab-eth .tab.active { border-bottom-color:var(--purple); }

  @media (max-width:768px) {
    .grid { padding:8px; gap:8px; }
    .header { padding:10px 12px; }
    .header h1 { font-size:15px; }
    .header-right { gap:8px; }
    .header .update { font-size:10px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .stats-row { grid-template-columns:repeat(2,1fr); gap:8px; }
    .stat { padding:8px; }
    .stat-value { font-size:15px; }
    .stat-label { font-size:10px; }
    .stat-sub { font-size:10px; }
    .card { padding:10px; }
    .card-header { flex-direction:column; align-items:flex-start; gap:6px; }
    .card-title { font-size:12px; }
    .tab { padding:8px 14px; font-size:13px; }
    .range-btn { padding:3px 8px; font-size:11px; }
    .trades-table { font-size:11px; }
    .trades-table th,.trades-table td { padding:6px 4px; }
    .trades-scroll { max-height:400px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .trades-scroll table { min-width:520px; }
    .perf-scroll { -webkit-overflow-scrolling:touch; }
    .perf-scroll table { min-width:480px; }
    .tabs-wrapper { padding:12px 8px 0 !important; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>Crypto Trading Dashboard</h1>
  <div class="header-right">
    <span class="update" id="lastUpdate">Loading...</span>
    <span class="theme-icon" id="themeIcon">&#9790;</span>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
  </div>
</div>

<!-- Asset Tabs -->
<div class="tabs-wrapper" style="padding:16px 24px 0">
  <div class="tabs" id="mainTabs">
    <div class="tab active" data-tab="btc" style="border-bottom-color:var(--orange)">BTC/USDT</div>
    <div class="tab" data-tab="eth">ETH/USDT</div>
  </div>
</div>

<!-- BTC Tab -->
<div class="tab-content active" id="tab-btc">
  <div class="grid">
    <div class="card"><div class="card-title">BTC Current Status</div><div class="stats-row" id="btcStatus"></div></div>
    <div class="card"><div class="card-title">BTC Performance</div><div class="perf-scroll" style="margin-top:8px"><div id="btcPerfTable"></div></div></div>
    <div class="card">
      <div class="card-header"><span class="card-title">BTC/USDT Price & Trade Signals</span>
        <div class="range-bar" data-tf="btc"><button class="range-btn" data-tf="4h">4H</button><button class="range-btn active" data-tf="1d">1D</button><button class="range-btn" data-tf="1w">1W</button><button class="range-btn" data-tf="1m">1M</button></div>
      </div><div id="chartBTC" class="chart"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">BTC Equity Curve</span>
        <div class="range-bar" data-chart="btc_eq"><button class="range-btn" data-range="90">3M</button><button class="range-btn" data-range="365">1Y</button><button class="range-btn" data-range="1095">3Y</button><button class="range-btn active" data-range="0">All</button></div>
      </div><div id="chartBTCEquity" class="chart"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">BTC Trade History</span>
        <div class="range-bar" id="btcTradeFilter"><button class="range-btn active" data-filter="all">All</button><button class="range-btn" data-filter="buy">Buys</button><button class="range-btn" data-filter="sell">Sells</button></div>
      </div><div class="trades-scroll" id="btcTrades"></div>
    </div>
  </div>
</div>

<!-- ETH Tab -->
<div class="tab-content" id="tab-eth">
  <div class="grid">
    <div class="card"><div class="card-title">ETH Current Status</div><div class="stats-row" id="ethStatus"></div></div>
    <div class="card"><div class="card-title">ETH Performance</div><div class="perf-scroll" style="margin-top:8px"><div id="ethPerfTable"></div></div></div>
    <div class="card">
      <div class="card-header"><span class="card-title">ETH/USDT Price & Trade Signals</span>
        <div class="range-bar" data-tf="eth"><button class="range-btn" data-tf="4h">4H</button><button class="range-btn active" data-tf="1d">1D</button><button class="range-btn" data-tf="1w">1W</button><button class="range-btn" data-tf="1m">1M</button></div>
      </div><div id="chartETH" class="chart"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">ETH Equity Curve</span>
        <div class="range-bar" data-chart="eth_eq"><button class="range-btn" data-range="90">3M</button><button class="range-btn" data-range="365">1Y</button><button class="range-btn" data-range="1095">3Y</button><button class="range-btn active" data-range="0">All</button></div>
      </div><div id="chartETHEquity" class="chart"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">ETH Trade History</span>
        <div class="range-bar" id="ethTradeFilter"><button class="range-btn active" data-filter="all">All</button><button class="range-btn" data-filter="buy">Buys</button><button class="range-btn" data-filter="sell">Sells</button></div>
      </div><div class="trades-scroll" id="ethTrades"></div>
    </div>
  </div>
</div>

<script>
var DATA = null;
var currentTF = { btc: '1d', eth: '1d' };
var currentEqRange = { btc_eq: 0, eth_eq: 0 };
var tradeFilter = { btc: 'all', eth: 'all' };
var activeTab = 'btc';

/* Theme */
function getTheme() { return document.documentElement.getAttribute('data-theme'); }
function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); document.getElementById('themeIcon').innerHTML = t === 'dark' ? '&#9790;' : '&#9788;'; if (DATA) renderAll(); }
function setTheme(t) { applyTheme(t); localStorage.setItem('theme', t); localStorage.setItem('themeManual', '1'); }
function resolveTheme() { if (localStorage.getItem('themeManual') === '1') { var s = localStorage.getItem('theme'); if (s) { applyTheme(s); return; } } applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }
document.getElementById('themeToggle').addEventListener('click', function() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); });
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() { if (localStorage.getItem('themeManual') !== '1') resolveTheme(); });
resolveTheme();

/* Tabs */
document.getElementById('mainTabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('tab')) return;
  activeTab = e.target.dataset.tab;
  document.querySelectorAll('#mainTabs .tab').forEach(function(t) { t.classList.remove('active'); t.style.borderBottomColor = 'transparent'; });
  e.target.classList.add('active');
  e.target.style.borderBottomColor = activeTab === 'btc' ? 'var(--orange)' : 'var(--purple)';
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  document.getElementById('tab-' + activeTab).classList.add('active');
  if (DATA) renderAll();
});

/* Chart helpers */
function chartColors() { var d = getTheme() === 'dark'; return { paper: d?'#1a1d28':'#fff', plot: d?'#1a1d28':'#fff', font: d?'#e0e0e0':'#333', grid: d?'#2a2d3a':'#e8e8e8', up: d?'#00c853':'#00a844', down: d?'#ff1744':'#d50000' }; }
function isMobile() { return window.innerWidth <= 768; }
function baseLayout() { var c = chartColors(); var m = isMobile(); return { paper_bgcolor:c.paper, plot_bgcolor:c.plot, font:{color:c.font,size:m?10:12}, margin:{l:m?40:55,r:m?10:20,t:10,b:m?30:40}, xaxis:{gridcolor:c.grid,type:'date',hoverformat:'%Y-%m-%d %H:%M '+_tz}, yaxis:{gridcolor:c.grid}, legend:{orientation:'h',y:1.08,x:.5,xanchor:'center',font:{size:m?9:11}}, hovermode:'x unified' }; }
var CCFG = { responsive: true, displayModeBar: false };
function msToDate(ms) { return new Date(ms); }
function msToDates(a) { return a.map(msToDate); }
var _tz = (function(){ var o=new Date().getTimezoneOffset(), h=Math.abs(Math.floor(o/60)), m=Math.abs(o%60); return 'UTC'+(o<=0?'+':'-')+h+(m?':'+String(m).padStart(2,'0'):''); })();
function fmtDate(ms) { var d=new Date(ms); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateTime(ms) { var d=new Date(ms); return fmtDate(ms)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+' '+_tz; }
function fmtMoney(v) { return v >= 1000 ? '$' + v.toLocaleString(undefined,{maximumFractionDigits:0}) : '$' + v.toFixed(2); }
function pctClass(v) { return v >= 0 ? 'positive' : 'negative'; }
function pctStr(v) { return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; }
function filterByRange(ts, days) { if (days === 0) return {start:0,end:ts.length}; var cut=Date.now()-days*864e5; for(var i=0;i<ts.length;i++) if(ts[i]>=cut) return {start:i,end:ts.length}; return {start:0,end:ts.length}; }
function round1(v) { return Math.round(v * 10) / 10; }
function ac(sym) { return sym.indexOf('BTC')>=0?'trade-asset-btc':'trade-asset-eth'; }

/* Status */
function renderStatus(divId, cur, asset) {
  var inTrade = asset === 'btc' ? cur.btc_in_trade : cur.eth_in_trade;
  var price = asset === 'btc' ? cur.btc_price : cur.eth_price;
  var rsi = asset === 'btc' ? cur.btc_rsi : cur.eth_rsi;
  var regime = asset === 'btc' ? cur.btc_regime : cur.eth_regime;
  var mom = asset === 'btc' ? cur.btc_momentum : cur.eth_momentum;
  var posPct = Math.round(Math.min(asset === 'btc' ? (cur.btc_position_pct || 0) : (cur.eth_position_pct || 0), 130));
  // Position bar
  var barMax = 150;
  var barFill = Math.min(posPct / barMax * 100, 100);
  var mark100 = 100 / barMax * 100;
  var fillColor = posPct > 100 ? 'var(--orange)' : posPct > 0 ? 'var(--green)' : 'var(--card-inner)';
  var posBar = '<div style="margin-top:6px;display:flex;align-items:center;gap:6px">'
    + '<div style="flex:1;height:16px;background:var(--card-inner);border-radius:4px;position:relative">'
    + '<div style="width:'+barFill+'%;height:100%;background:'+fillColor+';border-radius:4px;opacity:0.7"></div>'
    + '<div style="position:absolute;left:'+mark100+'%;top:0;width:1px;height:100%;background:var(--muted);opacity:0.5"></div>'
    + '</div>'
    + '<span style="font-size:12px;font-weight:600;min-width:40px">' + posPct + '%</span></div>';

  document.getElementById(divId).innerHTML =
    '<div class="stat"><div class="stat-label">Price</div><div class="stat-value">'+fmtMoney(price)+'</div><div class="stat-sub">RSI '+rsi+' &nbsp; '+regime+'</div></div>'
    +'<div class="stat"><div class="stat-label">Position</div><div class="stat-value" style="font-size:18px">' + (posPct > 0 ? posPct + '%' : 'No Position') + '</div>'+posBar+'</div>'
    +'<div class="stat"><div class="stat-label">Momentum (20d)</div><div class="stat-value '+pctClass(mom)+'">'+pctStr(mom)+'</div></div>';
}

/* Performance table */
function renderPerfTable(divId, stats, asset) {
  if (!stats.yearly) return;
  var fmtSh = function(v) { return v != null ? v.toFixed(2) : '\u2014'; };
  var shClass = function(v) { return v != null && v >= 1 ? 'positive' : v != null && v < 0 ? 'negative' : ''; };
  var retKey = asset + '_strat', bhKey = asset + '_bh', shKey = asset + '_sharpe';
  var totalRet = asset === 'btc' ? stats.btc_ret : stats.eth_ret;
  var totalBh = asset === 'btc' ? stats.btc_bh : stats.eth_bh;
  var totalSh = asset === 'btc' ? stats.btc_sharpe : stats.eth_sharpe;
  var totalDd = asset === 'btc' ? stats.btc_dd : stats.eth_dd;
  var ddKey = asset + '_dd';
  var html = '<table class="trades-table"><thead><tr><th>Year</th><th>Strategy</th><th>B&H</th><th>Alpha</th><th>Sharpe</th><th>MaxDD</th></tr></thead><tbody>';
  html += '<tr style="font-weight:700"><td>Total</td><td class="'+pctClass(totalRet)+'">'+pctStr(totalRet)+'</td><td class="'+pctClass(totalBh)+'">'+pctStr(totalBh)+'</td><td class="'+pctClass(totalRet-totalBh)+'">'+pctStr(totalRet-totalBh)+'</td><td class="'+shClass(totalSh)+'">'+fmtSh(totalSh)+'</td><td>'+totalDd+'%</td></tr>';
  for (var i = stats.yearly.length - 1; i >= 0; i--) {
    var y = stats.yearly[i];
    var sr = y[retKey], bh = y[bhKey], sh = y[shKey], dd = y[ddKey];
    var ddStr = dd != null ? dd + '%' : '\u2014';
    html += '<tr><td>'+y.year+'</td><td class="'+pctClass(sr)+'">'+pctStr(sr)+'</td><td class="'+pctClass(bh)+'">'+pctStr(bh)+'</td><td class="'+pctClass(sr-bh)+'">'+pctStr(sr-bh)+'</td><td class="'+shClass(sh)+'">'+fmtSh(sh)+'</td><td>'+ddStr+'</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById(divId).innerHTML = html;
}

/* Price chart */
function tradeHover(e) {
  var pct = e.trade_pct ? Math.round(e.trade_pct) + '% ' : '';
  var tag = (e.tag || '').toUpperCase();
  var line1 = fmtDateTime(e.time);
  var line2 = e.type + ' ' + pct + e.symbol + (tag ? ' (' + tag + ')' : '');
  var line3 = 'Price: ' + fmtMoney(e.price);
  var lines = [line1, line2, line3];
  if (e.type === 'SELL' && e.trade_return != null) lines.push('Trade P&L: ' + pctStr(e.trade_return));
  var pos = Math.round(Math.min(e.remaining_pct || 0, 130));
  lines.push('Position: ' + pos + '%');
  return lines.join('<br>');
}

/* Trade markers — reusable component for any chart
 * events:  timeline events array
 * xyFn:    function(event) → {x, yBuy, ySell} — positions for buy/sell markers
 * opts:    {size, tMin, tMax} — marker size and optional time filter
 * Returns: [buyTrace, sellTrace]
 */
function tradeMarkers(events, xyFn, opts) {
  if (!events || !events.length) return [];
  var c = chartColors();
  var sz = (opts && opts.size) || 12;
  var tMin = (opts && opts.tMin) || 0;
  var tMax = (opts && opts.tMax) || Infinity;
  var buyX=[],buyY=[],buyH=[],sellX=[],sellY=[],sellH=[];
  for (var i = 0; i < events.length; i++) {
    var e = events[i];
    if (e.time < tMin || e.time > tMax) continue;
    var p = xyFn(e);
    if (e.type === 'BUY') { buyX.push(p.x); buyY.push(p.yBuy); buyH.push(tradeHover(e)); }
    else { sellX.push(p.x); sellY.push(p.ySell); sellH.push(tradeHover(e)); }
  }
  return [
    {x:buyX,y:buyY,type:'scatter',mode:'markers',name:'BUY',showlegend:false,
      marker:{size:sz,color:c.up,symbol:'triangle-up',line:{width:2,color:'#fff'}},
      hovertext:buyH,hovertemplate:'%{hovertext}<extra></extra>'},
    {x:sellX,y:sellY,type:'scatter',mode:'markers',name:'SELL',showlegend:false,
      marker:{size:sz,color:c.down,symbol:'triangle-down',line:{width:2,color:'#fff'}},
      hovertext:sellH,hovertemplate:'%{hovertext}<extra></extra>'}
  ];
}

function renderPriceChart(divId, ohlcTF, emaTF, trades, emaLabels, tf, events) {
  var ohlc = ohlcTF[tf]; var emaData = emaTF[tf]; var c = chartColors();
  var visibleCandles = 100; var startIdx = Math.max(0, ohlc.t.length - visibleCandles);
  var t = msToDates(ohlc.t);
  var candle = {x:t, open:ohlc.o, high:ohlc.h, low:ohlc.l, close:ohlc.c, type:'candlestick', name:'Price',
    increasing:{line:{color:c.up}}, decreasing:{line:{color:c.down}}};
  var emaT = []; var emaKeys = Object.keys(emaData); var emaColors = ['#448aff', '#ff9100'];
  for (var i = 0; i < emaKeys.length; i++) {
    var ed = emaData[emaKeys[i]];
    emaT.push({x:msToDates(ed.t), y:ed.v, type:'scatter', mode:'lines', line:{width:1.5, color:emaColors[i]}, name:emaLabels[i]});
  }
  function findCandle(ms) { var bi=0,bd=Infinity; for(var ci=0;ci<ohlc.t.length;ci++){var d=Math.abs(ohlc.t[ci]-ms);if(d<bd){bd=d;bi=ci;}} return bi; }
  function candleX(ms) { return msToDate(ohlc.t[findCandle(ms)]); }
  var visLow=Infinity, visHigh=-Infinity;
  for (var vi=startIdx;vi<ohlc.t.length;vi++){if(ohlc.l[vi]<visLow)visLow=ohlc.l[vi];if(ohlc.h[vi]>visHigh)visHigh=ohlc.h[vi];}
  var yPad=(visHigh-visLow)*0.08;
  var markers = tradeMarkers(events, function(e) {
    var ci = findCandle(e.time);
    return {x: candleX(e.time), yBuy: ohlc.l[ci]*0.993, ySell: ohlc.h[ci]*1.007};
  }, {size: 13});
  var xStart=t.length>visibleCandles?t[startIdx]:t[0], xEnd=t[t.length-1];
  var ly=Object.assign({},baseLayout(),{height:isMobile()?300:450,hovermode:'closest',yaxis:Object.assign({},baseLayout().yaxis,{title:isMobile()?'':'Price (USD)',range:[visLow-yPad,visHigh+yPad]}),xaxis:Object.assign({},baseLayout().xaxis,{rangeslider:{visible:false},range:[xStart,xEnd]})});
  Plotly.newPlot(divId,[candle].concat(emaT,markers),ly,CCFG);
  document.getElementById(divId).on('plotly_relayout',function(ed){if(!ed||(!ed['xaxis.range[0]']&&!ed['xaxis.range']))return;var xMin,xMax;if(ed['xaxis.range[0]']){xMin=new Date(ed['xaxis.range[0]']).getTime();xMax=new Date(ed['xaxis.range[1]']).getTime();}else if(ed['xaxis.range']){xMin=new Date(ed['xaxis.range'][0]).getTime();xMax=new Date(ed['xaxis.range'][1]).getTime();}else return;var lo=Infinity,hi=-Infinity;for(var yi=0;yi<ohlc.t.length;yi++){if(ohlc.t[yi]>=xMin&&ohlc.t[yi]<=xMax){if(ohlc.l[yi]<lo)lo=ohlc.l[yi];if(ohlc.h[yi]>hi)hi=ohlc.h[yi];}}if(lo<Infinity){var pad=(hi-lo)*0.08;Plotly.relayout(divId,{'yaxis.range':[lo-pad,hi+pad]});}});
}

/* Equity chart (single asset) */
function renderEquityChart(divId, eq, bhKey, rangeDays, color, label, events) {
  var fr=filterByRange(eq.t,rangeDays);
  var step=Math.max(1,Math.floor((fr.end-fr.start)/2000));
  function ds(a){return a.slice(fr.start,fr.end).filter(function(_,i){return i%step===0;});}
  var eqVals = eq[label.toLowerCase()];
  var traces=[
    {x:ds(msToDates(eq.t)),y:ds(eq[bhKey]),type:'scatter',mode:'lines',name:label+' B&H',line:{color:color,width:1,dash:'dot'},opacity:0.5},
    {x:ds(msToDates(eq.t)),y:ds(eqVals),type:'scatter',mode:'lines',name:label+' Strategy',line:{color:color,width:2.5}},
  ];
  var tMin = fr.start < eq.t.length ? eq.t[fr.start] : 0;
  var tMax = fr.end <= eq.t.length ? eq.t[fr.end-1] : Infinity;
  function eqAt(ms) {
    var idx=0,bd=Infinity;
    for(var i=0;i<eq.t.length;i++){var d=Math.abs(eq.t[i]-ms);if(d<bd){bd=d;idx=i;}}
    return eqVals[idx];
  }
  var allY = eqVals.slice(fr.start, fr.end);
  var yMin=Infinity,yMax=-Infinity;
  for(var i=0;i<allY.length;i++){if(allY[i]<yMin)yMin=allY[i];if(allY[i]>yMax)yMax=allY[i];}
  var offset = (yMax - yMin) * 0.04 || 5;
  var markers = tradeMarkers(events, function(e) {
    var y = eqAt(e.time);
    var idx=0,bd=Infinity;
    for(var i=0;i<eq.t.length;i++){var d=Math.abs(eq.t[i]-e.time);if(d<bd){bd=d;idx=i;}}
    return {x: msToDate(eq.t[idx]), yBuy: y - offset, ySell: y + offset};
  }, {size: 11, tMin: tMin, tMax: tMax});
  Plotly.newPlot(divId,traces.concat(markers),Object.assign({},baseLayout(),{height:isMobile()?220:300,hovermode:'closest',yaxis:Object.assign({},baseLayout().yaxis,{title:isMobile()?'':'Value (base=100)'})}),CCFG);
}

/* Trade history */
function renderTrades(divId, events, filterMode) {
  var filtered = events;
  if (filterMode === 'buy') filtered = events.filter(function(e){ return e.type==='BUY'; });
  else if (filterMode === 'sell') filtered = events.filter(function(e){ return e.type==='SELL'; });
  var html = '<table class="trades-table"><thead><tr><th>Date</th><th>Action</th><th>Price</th><th>Trade P&L</th><th style="min-width:100px">Position</th></tr></thead><tbody>';
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var typeCls = e.type === 'BUY' ? 'trade-buy' : 'trade-sell';
    var pct = e.trade_pct || 0;
    var pctLabel = pct ? Math.round(pct) + '% ' : '';
    var tagText = e.tag || (e.type === 'BUY' ? 'Open' : 'Close');
    var tag = ' <span style="font-size:10px;color:var(--muted)">(' + tagText.toUpperCase() + ')</span>';
    var tPnl = '\u2014';
    if (e.type === 'SELL' && e.trade_return != null) {
      tPnl = '<span class="' + pctClass(e.trade_return) + '">' + pctStr(e.trade_return) + '</span>';
    }
    // Position bar: use backend-computed remaining_pct directly
    var displayPct = Math.round(Math.min(e.remaining_pct || 0, 130));
    var barMax = 150;
    var barFill = Math.min(displayPct / barMax * 100, 100);
    var mark100 = 100 / barMax * 100;
    var fillColor = displayPct > 100 ? 'var(--orange)' : displayPct > 0 ? 'var(--green)' : 'var(--card-inner)';
    var posBar = '<div style="display:flex;align-items:center;gap:6px">'
      + '<div style="width:'+(isMobile()?'80':'120')+'px;height:14px;background:var(--card-inner);border-radius:3px;position:relative">'
      + '<div style="width:'+barFill+'%;height:100%;background:'+fillColor+';border-radius:3px;opacity:0.7"></div>'
      + '<div style="position:absolute;left:'+mark100+'%;top:0;width:1px;height:100%;background:var(--muted);opacity:0.5"></div>'
      + '</div>'
      + '<span style="font-size:10px;min-width:35px">' + displayPct + '%</span></div>';

    html += '<tr><td>' + fmtDateTime(e.time) + '</td><td><span class="trade-type ' + typeCls + '">' + e.type + '</span> ' + pctLabel + '<span class="trade-asset ' + ac(e.symbol) + '">' + e.symbol + '</span>' + tag + '</td><td>' + fmtMoney(e.price) + '</td><td>' + tPnl + '</td><td>' + posBar + '</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById(divId).innerHTML = html;
}

/* Render all */
function renderAll() {
  if (!DATA) return;
  renderStatus('btcStatus', DATA.current, 'btc');
  renderStatus('ethStatus', DATA.current, 'eth');
  renderPerfTable('btcPerfTable', DATA.stats, 'btc');
  renderPerfTable('ethPerfTable', DATA.stats, 'eth');
  // Only render charts for active tab (performance)
  if (activeTab === 'btc') {
    var btcEvents = DATA.timeline.filter(function(e) { return e.symbol === 'BTC'; });
    renderPriceChart('chartBTC', DATA.btc_ohlc, DATA.btc_ema, DATA.trades_btc, ['EMA 50','EMA 200'], currentTF.btc, btcEvents);
    renderEquityChart('chartBTCEquity', DATA.equity, 'btc_bh', currentEqRange.btc_eq, '#ff9100', 'btc', btcEvents);
    renderTrades('btcTrades', btcEvents, tradeFilter.btc);
  } else {
    var ethEvents = DATA.timeline.filter(function(e) { return e.symbol === 'ETH'; });
    renderPriceChart('chartETH', DATA.eth_ohlc, DATA.eth_ema, DATA.trades_eth, ['EMA 40','EMA 100'], currentTF.eth, ethEvents);
    renderEquityChart('chartETHEquity', DATA.equity, 'eth_bh', currentEqRange.eth_eq, '#b388ff', 'eth', ethEvents);
    renderTrades('ethTrades', ethEvents, tradeFilter.eth);
  }
}

/* TF buttons */
document.querySelectorAll('.range-bar[data-tf]').forEach(function(bar) {
  var key = bar.dataset.tf;
  bar.querySelectorAll('.range-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentTF[key] = btn.dataset.tf;
      renderAll();
    });
  });
});

/* Equity range buttons */
document.querySelectorAll('.range-bar[data-chart]').forEach(function(bar) {
  var key = bar.dataset.chart;
  bar.querySelectorAll('.range-btn').forEach(function(btn) {
    if (parseInt(btn.dataset.range) === currentEqRange[key]) btn.classList.add('active');
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentEqRange[key] = parseInt(btn.dataset.range);
      renderAll();
    });
  });
});

/* Trade filter buttons */
['btcTradeFilter','ethTradeFilter'].forEach(function(id) {
  var asset = id.replace('TradeFilter','').toLowerCase();
  document.getElementById(id).addEventListener('click', function(ev) {
    if (!ev.target.classList.contains('range-btn')) return;
    document.querySelectorAll('#'+id+' .range-btn').forEach(function(b){ b.classList.remove('active'); });
    ev.target.classList.add('active');
    tradeFilter[asset] = ev.target.dataset.filter;
    renderAll();
  });
});

/* Data loading */
async function loadData() {
  try {
    var res = await fetch('/api/data');
    DATA = await res.json();
    window._lastUpdateTime = new Date(DATA.last_update);
    updateTimeAgo();
    renderAll();
  } catch (e) { console.error('Load failed:', e); }
}
function updateTimeAgo() {
  if (!window._lastUpdateTime) return;
  var diff = Math.floor((Date.now() - window._lastUpdateTime.getTime()) / 1000);
  var txt;
  if (diff < 60) txt = 'just now';
  else if (diff < 3600) txt = Math.floor(diff / 60) + 'm ago';
  else if (diff < 86400) txt = Math.floor(diff / 3600) + 'h ' + Math.floor((diff % 3600) / 60) + 'm ago';
  else txt = Math.floor(diff / 86400) + 'd ago';
  document.getElementById('lastUpdate').textContent = 'Updated ' + txt + ' · ' + fmtDateTime(window._lastUpdateTime.getTime());
}
loadData();
setInterval(loadData, 30 * 60 * 1000);
setInterval(updateTimeAgo, 30000);
</script>
