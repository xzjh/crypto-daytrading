<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Trading Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  :root[data-theme="dark"] {
    --bg: #0f1117; --card: #1a1d28; --card-inner: #12141c; --border: #2a2d3a;
    --text: #e0e0e0; --muted: #888; --green: #00c853; --red: #ff1744;
    --blue: #448aff; --orange: #ff9100; --purple: #b388ff; --cyan: #00e5ff;
    --btn-bg: #2a2d3a; --btn-active: #448aff; --btn-text: #ccc; --btn-active-text: #fff;
    --toggle-bg: #2a2d3a;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7; --card: #ffffff; --card-inner: #f0f1f3; --border: #dde0e6;
    --text: #1a1a2e; --muted: #777; --green: #00a844; --red: #d50000;
    --blue: #1565c0; --orange: #e65100; --purple: #7c4dff; --cyan: #0097a7;
    --btn-bg: #e8eaed; --btn-active: #1565c0; --btn-text: #555; --btn-active-text: #fff;
    --toggle-bg: #ccc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); transition:background .3s,color .3s; }
  .header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .header h1 { font-size:20px; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:14px; }
  .header .update { font-size:12px; color:var(--muted); }
  .theme-toggle { width:44px; height:24px; border-radius:12px; background:var(--toggle-bg); position:relative; cursor:pointer; border:none; transition:background .3s; }
  .theme-toggle::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--text); transition:transform .3s; }
  [data-theme="light"] .theme-toggle::after { transform:translateX(20px); }
  .theme-icon { font-size:14px; }
  .range-bar { display:flex; gap:4px; flex-wrap:wrap; }
  .range-btn { padding:4px 12px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; background:var(--btn-bg); color:var(--btn-text); transition:all .2s; }
  .range-btn.active { background:var(--btn-active); color:var(--btn-active-text); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px 24px; }
  .card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:16px; transition:background .3s,border-color .3s; }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
  .card-title { font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .card-full { grid-column:1/-1; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .stat { background:var(--card-inner); border-radius:8px; padding:12px; }
  .stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .stat-value { font-size:20px; font-weight:700; }
  .stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .positive { color:var(--green); }
  .negative { color:var(--red); }
  .signal { display:inline-block; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; }
  .signal-bull { background:rgba(0,200,83,.15); color:var(--green); }
  .signal-bear { background:rgba(255,23,68,.15); color:var(--red); }
  .trades-table { width:100%; border-collapse:collapse; font-size:13px; }
  .trades-table th,.trades-table td { padding:8px; border-bottom:1px solid var(--border); white-space:nowrap; vertical-align:middle; }
  .trades-table th { text-align:left; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; }
  .trades-table tbody tr { transition:background .15s; }
  .trades-table tbody tr:hover { background:var(--card-inner); }
  .trades-scroll { max-height:550px; overflow-y:auto; }
  .alloc-wrap { min-width:120px; }
  .alloc-bar { display:flex; height:16px; border-radius:4px; overflow:hidden; width:100%; }
  .alloc-seg { display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:600; color:#fff; }
  .alloc-btc { background:var(--orange); }
  .alloc-eth { background:var(--purple); }
  .alloc-cash { background:var(--muted); opacity:.25; }
  .alloc-target { display:flex; height:4px; border-radius:2px; overflow:hidden; width:100%; margin-top:2px; opacity:.5; }
  .alloc-target-seg { height:100%; }
  .trade-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; min-width:36px; text-align:center; }
  .trade-buy { background:rgba(0,200,83,.15); color:var(--green); }
  .trade-sell { background:rgba(255,23,68,.15); color:var(--red); }
  .trade-rebal { background:rgba(0,229,255,.12); color:var(--cyan); }
  .trade-asset { font-weight:600; }
  .trade-asset-btc { color:var(--orange); }
  .trade-asset-eth { color:var(--purple); }
  .chart { width:100%; }
  @media (max-width:768px) {
    .grid { grid-template-columns:1fr; padding:8px; gap:8px; }
    .header { padding:12px 16px; }
    .header h1 { font-size:16px; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .stat-value { font-size:16px; }
    .card { padding:12px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>Crypto Trading Dashboard</h1>
  <div class="header-right">
    <span class="update" id="lastUpdate">Loading...</span>
    <span class="theme-icon" id="themeIcon">&#9790;</span>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
  </div>
</div>
<div class="grid">
  <div class="card card-full">
    <div class="card-title">Current Status</div>
    <div class="stats-row" id="currentStats"></div>
  </div>
  <div class="card card-full">
    <div class="card-title">Performance</div>
    <div id="perfTable" style="margin-top:8px"></div>
  </div>
  <div class="card card-full">
    <div class="card-header">
      <span class="card-title">BTC/USDT Price & Trade Signals</span>
      <div class="range-bar" data-tf="btc"><button class="range-btn" data-tf="4h">4H</button><button class="range-btn active" data-tf="1d">1D</button><button class="range-btn" data-tf="1w">1W</button><button class="range-btn" data-tf="1m">1M</button></div>
    </div><div id="chartBTC" class="chart"></div>
  </div>
  <div class="card card-full">
    <div class="card-header">
      <span class="card-title">ETH/USDT Price & Trade Signals</span>
      <div class="range-bar" data-tf="eth"><button class="range-btn" data-tf="4h">4H</button><button class="range-btn active" data-tf="1d">1D</button><button class="range-btn" data-tf="1w">1W</button><button class="range-btn" data-tf="1m">1M</button></div>
    </div><div id="chartETH" class="chart"></div>
  </div>
  <div class="card card-full">
    <div class="card-header"><span class="card-title">Equity Curves (Normalized to 100)</span>
      <div class="range-bar" data-chart="equity"><button class="range-btn" data-range="30">1M</button><button class="range-btn" data-range="90">3M</button><button class="range-btn" data-range="180">6M</button><button class="range-btn" data-range="365">1Y</button><button class="range-btn" data-range="1095">3Y</button><button class="range-btn" data-range="1825">5Y</button><button class="range-btn" data-range="0">All</button></div>
    </div><div id="chartEquity" class="chart"></div>
  </div>
  <div class="card card-full">
    <div class="card-header"><span class="card-title">Trade & Allocation History</span>
      <div class="range-bar" id="tradeFilter"><button class="range-btn active" data-filter="all">All</button><button class="range-btn" data-filter="buy">Buys</button><button class="range-btn" data-filter="sell">Sells</button></div>
    </div><div class="trades-scroll" id="allTrades" style="max-height:550px"></div>
  </div>
</div>
<script>
var DATA = null;
var currentRanges = { btc: 30, eth: 30, equity: 30 };
var currentTF = { btc: '1d', eth: '1d' };
var tradeFilterMode = 'all';

/* Theme */
function getTheme() { return document.documentElement.getAttribute('data-theme'); }
function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); document.getElementById('themeIcon').innerHTML = t === 'dark' ? '&#9790;' : '&#9788;'; if (DATA) renderAllCharts(); }
function setTheme(t) { applyTheme(t); localStorage.setItem('theme', t); localStorage.setItem('themeManual', '1'); }
function resolveTheme() { if (localStorage.getItem('themeManual') === '1') { var s = localStorage.getItem('theme'); if (s) { applyTheme(s); return; } } applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }
document.getElementById('themeToggle').addEventListener('click', function() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); });
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() { if (localStorage.getItem('themeManual') !== '1') resolveTheme(); });
resolveTheme();

/* Chart colors */
function chartColors() { var d = getTheme() === 'dark'; return { paper: d?'#1a1d28':'#fff', plot: d?'#1a1d28':'#fff', font: d?'#e0e0e0':'#333', grid: d?'#2a2d3a':'#e8e8e8', up: d?'#00c853':'#00a844', down: d?'#ff1744':'#d50000' }; }
function baseLayout() { var c = chartColors(); return { paper_bgcolor:c.paper, plot_bgcolor:c.plot, font:{color:c.font,size:12}, margin:{l:55,r:20,t:10,b:40}, xaxis:{gridcolor:c.grid,type:'date'}, yaxis:{gridcolor:c.grid}, legend:{orientation:'h',y:1.08,x:.5,xanchor:'center',font:{size:11}}, hovermode:'x unified' }; }
var CCFG = { responsive: true, displayModeBar: false };

/* Helpers */
function msToDate(ms) { return new Date(ms); }
function msToDates(a) { return a.map(msToDate); }
function fmtDate(ms) { var d = new Date(ms); return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0'); }
function fmtDateTime(ms) { var d = new Date(ms); return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0') + ' ' + String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0'); }
function fmtMoney(v) { return v >= 1000 ? '$' + v.toLocaleString(undefined,{maximumFractionDigits:0}) : '$' + v.toFixed(2); }
function pctClass(v) { return v >= 0 ? 'positive' : 'negative'; }
function pctStr(v) { return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; }
function filterByRange(ts, days) { if (days === 0) return {start:0,end:ts.length}; var cut=Date.now()-days*864e5; for(var i=0;i<ts.length;i++) if(ts[i]>=cut) return {start:i,end:ts.length}; return {start:0,end:ts.length}; }
function ac(desc) { return desc.indexOf('BTC')>=0?'trade-asset-btc':desc.indexOf('ETH')>=0?'trade-asset-eth':''; }
function allocBar(rb,re,rc,tb,te) {
  var s='';
  if(rb>0) s+='<div class="alloc-seg alloc-btc" style="width:'+rb+'%">'+(rb>8?'BTC '+rb+'%':'')+'</div>';
  if(re>0) s+='<div class="alloc-seg alloc-eth" style="width:'+re+'%">'+(re>8?'ETH '+re+'%':'')+'</div>';
  if(rc>0) s+='<div class="alloc-seg alloc-cash" style="width:'+rc+'%">'+(rc>20?'Cash '+rc+'%':'')+'</div>';
  var bar = '<div class="alloc-bar">'+s+'</div>';
  var t='';
  if(tb>0) t+='<div class="alloc-target-seg alloc-btc" style="width:'+tb+'%"></div>';
  if(te>0) t+='<div class="alloc-target-seg alloc-eth" style="width:'+te+'%"></div>';
  var rest=100-((tb||0)+(te||0));
  if(rest>0) t+='<div class="alloc-target-seg alloc-cash" style="width:'+rest+'%"></div>';
  var target='<div class="alloc-target">'+t+'</div>';
  return '<div class="alloc-wrap">'+bar+target+'</div>';
}

/* Current Stats */
function renderCurrentStats(cur) {
  var bp=cur.btc_in_trade, ep=cur.eth_in_trade, bc=!bp&&!ep;
  var at,acl; if(bc){at='ALL CASH';acl='';} else if(bp&&!ep){at='BTC 100%';acl='trade-asset-btc';} else if(!bp&&ep){at='ETH 100%';acl='trade-asset-eth';} else{at=cur.btc_momentum>cur.eth_momentum?'BTC 70% / ETH 30%':'BTC 30% / ETH 70%';acl='';}
  function pl(t,r){return t?'<span class="signal signal-bull">LONG</span>':'<span class="signal signal-bear">CASH</span> <span style="font-size:10px;color:var(--muted)">('+r+')</span>';}
  document.getElementById('currentStats').innerHTML='<div class="stat"><div class="stat-label">BTC Price</div><div class="stat-value">'+fmtMoney(cur.btc_price)+'</div><div class="stat-sub">RSI '+cur.btc_rsi+' '+pl(bp,cur.btc_regime)+'</div></div>'
    +'<div class="stat"><div class="stat-label">ETH Price</div><div class="stat-value">'+fmtMoney(cur.eth_price)+'</div><div class="stat-sub">RSI '+cur.eth_rsi+' '+pl(ep,cur.eth_regime)+'</div></div>'
    +'<div class="stat"><div class="stat-label">BTC Momentum (20d)</div><div class="stat-value '+pctClass(cur.btc_momentum)+'">'+pctStr(cur.btc_momentum)+'</div></div>'
    +'<div class="stat"><div class="stat-label">ETH Momentum (20d)</div><div class="stat-value '+pctClass(cur.eth_momentum)+'">'+pctStr(cur.eth_momentum)+'</div></div>'
    +'<div class="stat"><div class="stat-label">Actual Allocation</div><div class="stat-value '+acl+'" style="font-size:16px">'+at+'</div>'+(bc?'<div class="stat-sub">Both strategies exited</div>':'')+'</div>';
}

/* Perf Stats */
function renderPerfStats(s) {
  if (!s.yearly) return;
  var fmtSh = function(v) { return v != null ? v.toFixed(2) : '\u2014'; };
  var shClass = function(v) { return v != null && v >= 1 ? 'positive' : v != null && v < 0 ? 'negative' : ''; };

  var html = '<table class="trades-table"><thead><tr>'
    + '<th>Year</th><th>BTC Strategy</th><th>ETH Strategy</th><th>Portfolio</th>'
    + '<th>BTC Sharpe</th><th>ETH Sharpe</th><th>Alpha</th>'
    + '</tr></thead><tbody>';

  // Total row first
  var totalAlpha = round1(s.port_ret - (s.btc_bh + s.eth_bh) / 2);
  html += '<tr style="font-weight:700">'
    + '<td>Total</td>'
    + '<td class="' + pctClass(s.btc_ret) + '">' + pctStr(s.btc_ret) + ' <span style="font-weight:400;font-size:11px;color:var(--muted)">B&H ' + pctStr(s.btc_bh) + '</span></td>'
    + '<td class="' + pctClass(s.eth_ret) + '">' + pctStr(s.eth_ret) + ' <span style="font-weight:400;font-size:11px;color:var(--muted)">B&H ' + pctStr(s.eth_bh) + '</span></td>'
    + '<td class="' + pctClass(s.port_ret) + '">' + pctStr(s.port_ret) + '</td>'
    + '<td class="' + shClass(s.btc_sharpe) + '">' + fmtSh(s.btc_sharpe) + '</td>'
    + '<td class="' + shClass(s.eth_sharpe) + '">' + fmtSh(s.eth_sharpe) + '</td>'
    + '<td class="' + pctClass(totalAlpha) + '">' + pctStr(totalAlpha) + '</td>'
    + '</tr>';

  // Per-year rows (reverse order, newest first)
  for (var i = s.yearly.length - 1; i >= 0; i--) {
    var y = s.yearly[i];
    html += '<tr>'
      + '<td>' + y.year + '</td>'
      + '<td class="' + pctClass(y.btc_strat) + '">' + pctStr(y.btc_strat) + ' <span style="font-size:11px;color:var(--muted)">B&H ' + pctStr(y.btc_bh) + '</span></td>'
      + '<td class="' + pctClass(y.eth_strat) + '">' + pctStr(y.eth_strat) + ' <span style="font-size:11px;color:var(--muted)">B&H ' + pctStr(y.eth_bh) + '</span></td>'
      + '<td class="' + pctClass(y.port) + '">' + pctStr(y.port) + '</td>'
      + '<td class="' + shClass(y.btc_sharpe) + '">' + fmtSh(y.btc_sharpe) + '</td>'
      + '<td class="' + shClass(y.eth_sharpe) + '">' + fmtSh(y.eth_sharpe) + '</td>'
      + '<td class="' + pctClass(y.alpha) + '">' + pctStr(y.alpha) + '</td>'
      + '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('perfTable').innerHTML = html;
}

function round1(v) { return Math.round(v * 10) / 10; }

/* Price Charts */
function renderPriceChart(divId, ohlcTF, emaTF, trades, emaLabels, tf) {
  var ohlc = ohlcTF[tf];
  var emaData = emaTF[tf];
  var c = chartColors();
  var t = msToDates(ohlc.t);
  var candle = {x:t, open:ohlc.o, high:ohlc.h, low:ohlc.l, close:ohlc.c, type:'candlestick', name:'Price',
    increasing:{line:{color:c.up}}, decreasing:{line:{color:c.down}}};

  // EMAs
  var emaT = [];
  var emaKeys = Object.keys(emaData);
  var emaColors = ['#448aff', '#ff9100'];
  for (var i = 0; i < emaKeys.length; i++) {
    var ed = emaData[emaKeys[i]];
    emaT.push({x:msToDates(ed.t), y:ed.v,
      type:'scatter', mode:'lines', line:{width:1.5, color:emaColors[i]}, name:emaLabels[i]});
  }

  // Buy/Sell markers (all trades)
  var vt = trades;
  // Candle half-width in ms (for centering markers)
  var candleHalf = ohlc.t.length >= 2 ? (ohlc.t[1] - ohlc.t[0]) / 2 : 0;

  function findCandle(tradeMs) {
    var bestIdx = 0, bestDist = Infinity;
    for (var ci = 0; ci < ohlc.t.length; ci++) {
      var dist = Math.abs(ohlc.t[ci] - tradeMs);
      if (dist < bestDist) { bestDist = dist; bestIdx = ci; }
    }
    return bestIdx;
  }

  function candleCenterX(tradeMs) {
    var ci = findCandle(tradeMs);
    return msToDate(ohlc.t[ci]);
  }

  var buyY = vt.map(function(tr) {
    var ci = findCandle(tr.entry_time);
    return ohlc.l[ci] * 0.995;
  });
  var sellY = vt.map(function(tr) {
    var ci = findCandle(tr.exit_time);
    return ohlc.h[ci] * 1.005;
  });

  // Build annotations (Binance-style B/S bubbles) — visual only, no hover
  var annotations = [];
  for (var ai = 0; ai < vt.length; ai++) {
    var tr = vt[ai];
    var bci = findCandle(tr.entry_time);
    annotations.push({
      x: candleCenterX(tr.entry_time), y: ohlc.l[bci] * 0.993,
      text: 'B', font: {color:'#fff', size:11, family:'Arial Black'},
      bgcolor: c.up, bordercolor: c.up, borderwidth: 1, borderpad: 4,
      showarrow: true, arrowhead: 0, arrowwidth: 1.5, arrowcolor: c.up,
      ay: 25, ax: 0, captureevents: false,
    });
    if (!tr.is_open) {
      var sci = findCandle(tr.exit_time);
      annotations.push({
        x: candleCenterX(tr.exit_time), y: ohlc.h[sci] * 1.007,
        text: 'S', font: {color:'#fff', size:11, family:'Arial Black'},
        bgcolor: c.down, bordercolor: c.down, borderwidth: 1, borderpad: 4,
        showarrow: true, arrowhead: 0, arrowwidth: 1.5, arrowcolor: c.down,
        ay: -25, ax: 0, captureevents: false,
      });
    }
  }

  // Invisible scatter traces for hover info
  var buyT = {x:vt.map(function(tr){return candleCenterX(tr.entry_time);}),
    y:vt.map(function(tr){ var ci=findCandle(tr.entry_time); return ohlc.l[ci]; }),
    type:'scatter', mode:'markers', name:'BUY', showlegend:false,
    marker:{size:20, color:'rgba(0,0,0,0)'},
    text:vt.map(function(tr){return 'Entry: '+fmtMoney(tr.entry_price)+'<br>SL: '+(tr.sl?fmtMoney(tr.sl):'N/A');}),
    hovertemplate:'%{text}<extra>BUY</extra>'};
  var completedTrades = vt.filter(function(tr){return !tr.is_open;});
  var sellT = {x:completedTrades.map(function(tr){return candleCenterX(tr.exit_time);}),
    y:completedTrades.map(function(tr){ var ci=findCandle(tr.exit_time); return ohlc.h[ci]; }),
    type:'scatter', mode:'markers', name:'SELL', showlegend:false,
    marker:{size:20, color:'rgba(0,0,0,0)'},
    text:completedTrades.map(function(tr){return 'Exit: '+fmtMoney(tr.exit_price)+'<br>P&L: '+pctStr(tr.return_pct);}),
    hovertemplate:'%{text}<extra>SELL</extra>'};

  // Show last ~100 candles by default
  var visibleCandles = 100;
  var startIdx = Math.max(0, ohlc.t.length - visibleCandles);
  var xStart = t[startIdx];
  var xEnd = t[t.length - 1];

  // Compute Y range from visible candles (with 5% padding)
  var visLow = Infinity, visHigh = -Infinity;
  for (var vi = startIdx; vi < ohlc.t.length; vi++) {
    if (ohlc.l[vi] < visLow) visLow = ohlc.l[vi];
    if (ohlc.h[vi] > visHigh) visHigh = ohlc.h[vi];
  }
  var yPad = (visHigh - visLow) * 0.08;

  var ly = Object.assign({}, baseLayout(), {height:450,
    yaxis:Object.assign({}, baseLayout().yaxis, {title:'Price (USD)', range:[visLow - yPad, visHigh + yPad]}),
    xaxis:Object.assign({}, baseLayout().xaxis, {
      rangeslider:{visible:false},
      range:[xStart, xEnd],
    }),
    annotations: annotations,
  });
  Plotly.newPlot(divId, [candle].concat(emaT, [buyT, sellT]), ly, CCFG);

  // Auto-fit Y axis when X range changes (pan/zoom)
  document.getElementById(divId).on('plotly_relayout', function(ed) {
    if (!ed || (!ed['xaxis.range[0]'] && !ed['xaxis.range'])) return;
    var xMin, xMax;
    if (ed['xaxis.range[0]']) {
      xMin = new Date(ed['xaxis.range[0]']).getTime();
      xMax = new Date(ed['xaxis.range[1]']).getTime();
    } else if (ed['xaxis.range']) {
      xMin = new Date(ed['xaxis.range'][0]).getTime();
      xMax = new Date(ed['xaxis.range'][1]).getTime();
    } else return;

    var lo = Infinity, hi = -Infinity;
    for (var yi = 0; yi < ohlc.t.length; yi++) {
      if (ohlc.t[yi] >= xMin && ohlc.t[yi] <= xMax) {
        if (ohlc.l[yi] < lo) lo = ohlc.l[yi];
        if (ohlc.h[yi] > hi) hi = ohlc.h[yi];
      }
    }
    if (lo < Infinity) {
      var pad = (hi - lo) * 0.08;
      Plotly.relayout(divId, {'yaxis.range': [lo - pad, hi + pad]});
    }
  });
}

/* Equity Chart */
function renderEquityChart(eq, rangeDays) {
  var fr=filterByRange(eq.t,rangeDays), step=Math.max(1,Math.floor((fr.end-fr.start)/2000));
  function ds(a){return a.slice(fr.start,fr.end).filter(function(_,i){return i%step===0;});}
  var traces=[
    {x:ds(msToDates(eq.t)),y:ds(eq.btc_bh),type:'scatter',mode:'lines',name:'BTC B&H',line:{color:'#ff9100',width:1,dash:'dot'},opacity:0.5},
    {x:ds(msToDates(eq.t)),y:ds(eq.eth_bh),type:'scatter',mode:'lines',name:'ETH B&H',line:{color:'#b388ff',width:1,dash:'dot'},opacity:0.5},
    {x:ds(msToDates(eq.t)),y:ds(eq.btc),type:'scatter',mode:'lines',name:'BTC Strategy',line:{color:'#ff9100',width:2}},
    {x:ds(msToDates(eq.t)),y:ds(eq.eth),type:'scatter',mode:'lines',name:'ETH Strategy',line:{color:'#b388ff',width:2}},
    {x:ds(msToDates(eq.t)),y:ds(eq.portfolio),type:'scatter',mode:'lines',name:'Portfolio Rotation',line:{color:'#00e5ff',width:2.5}},
  ];
  Plotly.newPlot('chartEquity',traces,Object.assign({},baseLayout(),{height:400,yaxis:Object.assign({},baseLayout().yaxis,{title:'Value (base=100)'})}),CCFG);
}

/* Timeline */
function renderTimeline(events) {
  var filtered = events;
  if (tradeFilterMode === 'buy') filtered = events.filter(function(e){ return e.type==='BUY'; });
  else if (tradeFilterMode === 'sell') filtered = events.filter(function(e){ return e.type==='SELL'; });

  var html = '<table class="trades-table"><thead><tr>'
    + '<th>Date</th><th>Action</th><th>Price</th><th>SL</th>'
    + '<th>Trade P&L</th><th>NAV</th><th>Fund Return</th><th style="min-width:140px">Allocation</th>'
    + '</tr></thead><tbody>';

  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var navStr = e.nav ? e.nav.toFixed(4) : '\u2014';
    var fRetCls = e.fund_return != null ? pctClass(e.fund_return) : '';
    var fRetStr = e.fund_return != null ? pctStr(e.fund_return) : '\u2014';
    var alloc = allocBar(e.real_btc||0, e.real_eth||0, e.real_cash||0, e.target_btc||0, e.target_eth||0);

    var typeCls = e.type === 'BUY' ? 'trade-buy' : 'trade-sell';
    var pctLabel = e.trade_pct ? e.trade_pct + '% ' : '';
    var tag = '';
    if (e.type === 'BUY') {
      // Check previous event for this asset: was it already held?
      var prevHeld = false;
      for (var j = i + 1; j < filtered.length; j++) {
        if (filtered[j].symbol === e.symbol) {
          // Found last event for same asset
          if (filtered[j].type === 'BUY') prevHeld = true; // still open
          break;
        }
      }
      tag = prevHeld ? ' <span style="font-size:10px;color:var(--muted)">(ADD)</span>'
                     : ' <span style="font-size:10px;color:var(--muted)">(OPEN)</span>';
    } else if (e.type === 'SELL') {
      if (e.is_open) {
        tag = ' <span style="font-size:10px;color:var(--cyan)">HOLDING</span>';
      } else {
        var assetRemains = (e.symbol === 'BTC' && (e.real_btc || 0) > 0.1) || (e.symbol === 'ETH' && (e.real_eth || 0) > 0.1);
        tag = assetRemains ? ' <span style="font-size:10px;color:var(--muted)">(REDUCE)</span>'
                           : ' <span style="font-size:10px;color:var(--muted)">(CLOSE)</span>';
        if (e.sl_triggered) tag += ' <span style="font-size:10px;color:var(--red)">SL</span>';
      }
    }
    var actionHtml = '<span class="trade-type ' + typeCls + '">' + e.type + '</span> '
      + pctLabel + '<span class="trade-asset ' + ac(e.symbol) + '">' + e.symbol + '</span>' + tag;

    var tPnl = '\u2014';
    if (e.type === 'SELL' && e.trade_return != null) {
      tPnl = '<span class="' + pctClass(e.trade_return) + '">' + pctStr(e.trade_return) + '</span>';
    }

    var title = e.detail || '';

    html += '<tr title="' + title + '">'
      + '<td>' + fmtDateTime(e.time) + '</td>'
      + '<td>' + actionHtml + '</td>'
      + '<td>' + fmtMoney(e.price) + '</td>'
      + '<td>' + (e.sl ? fmtMoney(e.sl) : '\u2014') + '</td>'
      + '<td>' + tPnl + '</td>'
      + '<td>' + navStr + '</td>'
      + '<td class="' + fRetCls + '">' + fRetStr + '</td>'
      + '<td>' + alloc + '</td>'
      + '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('allTrades').innerHTML = html;
}

document.getElementById('tradeFilter').addEventListener('click', function(ev) {
  if (!ev.target.classList.contains('range-btn')) return;
  document.querySelectorAll('#tradeFilter .range-btn').forEach(function(b){ b.classList.remove('active'); });
  ev.target.classList.add('active');
  tradeFilterMode = ev.target.dataset.filter;
  if (DATA) renderTimeline(DATA.timeline);
});

/* Charts dispatcher */
function renderAllCharts() {
  if (!DATA) return;
  renderPriceChart('chartBTC', DATA.btc_ohlc, DATA.btc_ema, DATA.trades_btc, ['EMA 50','EMA 200'], currentTF.btc);
  renderPriceChart('chartETH', DATA.eth_ohlc, DATA.eth_ema, DATA.trades_eth, ['EMA 40','EMA 100'], currentTF.eth);
  renderEquityChart(DATA.equity, currentRanges.equity);
}

/* Range buttons (equity chart only) */
document.querySelectorAll('.range-bar[data-chart]').forEach(function(bar) {
  var chartKey = bar.dataset.chart;
  bar.querySelectorAll('.range-btn').forEach(function(btn) {
    if (parseInt(btn.dataset.range) === currentRanges[chartKey]) btn.classList.add('active');
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentRanges[chartKey] = parseInt(btn.dataset.range);
      renderAllCharts();
    });
  });
});

/* Timeframe buttons */
document.querySelectorAll('.range-bar[data-tf]').forEach(function(bar) {
  var chartKey = bar.dataset.tf;
  bar.querySelectorAll('.range-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentTF[chartKey] = btn.dataset.tf;
      renderAllCharts();
    });
  });
});

/* Data loading */
async function loadData() {
  try {
    var res = await fetch('/api/data');
    DATA = await res.json();
    document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date(DATA.last_update).toLocaleString();
    renderCurrentStats(DATA.current);
    renderAllCharts();
    renderPerfStats(DATA.stats);
    renderTimeline(DATA.timeline);
  } catch (e) { console.error('Load failed:', e); }
}
loadData();
setInterval(loadData, 30 * 60 * 1000);
</script>
